## TEMPORARY — DELETE BEFORE PR.
## Tests the lambda layer build with upstream caching. No AWS access, no releases.
name: Test Lambda Cache

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-lambda-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 #v5.0.0
        with:
          java-version-file: .java-version
          distribution: 'temurin'

      - name: Build lambda layer
        uses: ./.github/actions/build-lambda-layer

      - name: Verify layer artifact
        run: |
          ls -la lambda-layer/build/distributions/aws-opentelemetry-java-layer.zip
          unzip -l lambda-layer/build/distributions/aws-opentelemetry-java-layer.zip
