name: Test ECR Multi-Arch Tagging
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Test version tag (e.g., test-tagging-1)'
        required: true
        default: 'test-tagging-1'
  push:
    branches: 
      - 'tag-ecr'

env:
  AWS_REGION: us-west-2
  STAGING_ECR_REGISTRY: 611364707713.dkr.ecr.us-west-2.amazonaws.com
  STAGING_ECR_REPOSITORY: 611364707713.dkr.ecr.us-west-2.amazonaws.com/adot-autoinstrumentation-java-operator-staging
  VERSION: ${{ github.event.inputs.version || 'test-tagging-push' }}

permissions:
  id-token: write
  contents: read

jobs:
  test-multi-arch-tagging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 #v5.0.0
        with:
          java-version-file: .java-version
          distribution: 'temurin'

      - name: Publish patched dependencies to maven local
        uses: ./.github/actions/patch-dependencies
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_password: ${{ secrets.GPG_PASSPHRASE }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@a03048d87541d1d9fcf2ecf528a4a65ba9bd7838 #v5.0.0
        with:
          role-to-assume: ${{ secrets.JAVA_INSTRUMENTATION_SNAPSHOT_ECR }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to staging ECR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 #v3.5.0
        with:
          registry: ${{ env.STAGING_ECR_REGISTRY }}

      - name: Build SDK jar
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 #v3.5.0
        with:
          arguments: build -PlocalDocker=true -Prelease.version=0.0.1 --stacktrace -x test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 #3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 #v3.11.1
        with:
          driver-opts: image=moby/buildkit:v0.15.1

      # Mirrors the release workflow: per-arch tags to private ECR only
      - name: Build and push amd64 image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 #v6.18.0
        with:
          push: true
          build-args: "ADOT_JAVA_VERSION=0.0.1"
          context: .
          platforms: linux/amd64
          tags: |
            ${{ env.STAGING_ECR_REPOSITORY }}:v${{ env.VERSION }}-amd64

      - name: Build and push arm64 image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 #v6.18.0
        with:
          push: true
          build-args: "ADOT_JAVA_VERSION=0.0.1"
          context: .
          platforms: linux/arm64
          tags: |
            ${{ env.STAGING_ECR_REPOSITORY }}:v${{ env.VERSION }}-arm64

      # Mirrors the release workflow: multi-arch manifest (in prod this goes to both public + private)
      - name: Build and push multi-arch image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 #v6.18.0
        with:
          push: true
          build-args: "ADOT_JAVA_VERSION=0.0.1"
          context: .
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.STAGING_ECR_REPOSITORY }}:v${{ env.VERSION }}

      - name: Verify all three tags exist
        run: |
          echo "=== Multi-arch manifest: v${{ env.VERSION }} ==="
          docker buildx imagetools inspect ${{ env.STAGING_ECR_REPOSITORY }}:v${{ env.VERSION }}

          echo ""
          echo "=== Per-arch: v${{ env.VERSION }}-amd64 ==="
          docker buildx imagetools inspect ${{ env.STAGING_ECR_REPOSITORY }}:v${{ env.VERSION }}-amd64

          echo ""
          echo "=== Per-arch: v${{ env.VERSION }}-arm64 ==="
          docker buildx imagetools inspect ${{ env.STAGING_ECR_REPOSITORY }}:v${{ env.VERSION }}-arm64

          echo ""
          echo "All three tags present. ARS replication should succeed."
