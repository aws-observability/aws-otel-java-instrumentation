name: DI Contract Tests

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
    branches:
      - main
      - "release/v*"
  workflow_dispatch:

jobs:
  di-contract-tests:
    runs-on: ubuntu-latest
    strategy:
      # The matrix varies only the base image of the di-spring-boot test app, so the agent is
      # exercised against both Java 17 and Java 21 target runtimes. The build itself always runs on
      # the repo's JDK (.java-version), which the patched OpenTelemetry dependencies require.
      matrix:
        base-image:
          - "public.ecr.aws/docker/library/amazoncorretto:17-alpine"
          - "public.ecr.aws/docker/library/amazoncorretto:21-alpine"
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Java
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          java-version-file: .java-version
          distribution: temurin

      - name: Cache local Maven repository
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/.m2/repository/io/opentelemetry/
          key: ${{ runner.os }}-maven-local-${{ hashFiles('.github/patches/opentelemetry-java*.patch') }}

      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: Publish patched dependencies to maven local
        uses: ./.github/actions/patch-dependencies

      - name: Pull base Docker images
        run: |
          docker pull "${{ matrix.base-image }}"
          docker pull public.ecr.aws/docker/library/amazoncorretto:23-alpine

      - name: Run DI contract tests
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3.5.0
        with:
          arguments: :appsignals-tests:contract-tests:diContractTests -PlocalDocker=true "-PdiBaseImage=${{ matrix.base-image }}" -i
